name: alarm
description: A simple Flutter alarm manager plugin for both iOS and Android.
version: 5.6.0
homepage: https://github.com/gdelataillade/alarm

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  collection: any
  equatable: ^2.1.0
  flutter:
    sdk: flutter
  flutter_fgbg: ^0.8.0
  json_annotation: ^4.12.0
  logging: ^1.3.0
  plugin_platform_interface: ^2.1.8
  rxdart: ^0.28.0
  shared_preferences: ^2.5.5

dev_dependencies:
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.14.0
  pigeon: ^27.1.0
  very_good_analysis: ^10.3.0

flutter:
  assets:
    - assets/long_blank.mp3
    - assets/not_blank.mp3

  plugin:
    platforms:
      android:
        package: com.gdelataillade.alarm.alarm
        pluginClass: AlarmPlugin
      ios:
        pluginClass: SwiftAlarmPlugin
